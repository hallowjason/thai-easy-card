<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai Easy Card — 泰文單字卡</title>
  <meta name="description" content="中/泰雙語 SRS 單字卡，搭配原聲 TTS，徹底戒除拼音，直接建立泰語直覺。">
  <meta name="theme-color" content="#C8703A">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- 字型 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Thai <span>Easy</span> Card</h1>
  <span style="font-size:13px;color:var(--text-sub)">泰文單字卡</span>
</header>

<nav>
  <button data-nav="study" class="active">📚 學習</button>
  <button data-nav="stats">📊 統計</button>
  <button data-nav="settings">⚙️ 設定</button>
</nav>

<main>

  <!-- ── 學習頁 ── -->
  <section id="screen-study">
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div id="progress-bar"></div></div>
      <span id="progress">0 / 0</span>
    </div>

    <!-- 卡片 -->
    <div class="card-wrap">
      <div id="card">
        <div class="card-side" id="card-front">
          <span id="card-type-label"></span>
          <img id="card-image" alt="" style="display:none">
          <div id="front-content"></div>
        </div>
        <div class="card-side" id="card-back">
          <div id="back-content"></div>
        </div>
      </div>
    </div>

    <!-- 空狀態 -->
    <div id="empty-state" class="hidden">
      <div class="empty-icon">🎉</div>
      <div class="empty-title">今日完成！</div>
      <div class="empty-sub">所有卡片已複習完畢，明天繼續保持！</div>
    </div>

    <!-- 操作按鈕列 -->
    <div class="action-row">
      <button class="btn btn-primary" id="btn-flip">翻牌查看</button>
      <button class="btn btn-audio" id="btn-audio" title="播放泰語發音">🔊</button>
    </div>

    <!-- 評分列（翻牌後顯示） -->
    <div id="grade-row" class="hidden">
      <button class="btn-grade grade-again" data-grade="0">
        <span class="grade-label">不記得</span>
        <span class="grade-sub">立刻重來</span>
      </button>
      <button class="btn-grade grade-hard" data-grade="1">
        <span class="grade-label">困難</span>
        <span class="grade-sub">稍後再見</span>
      </button>
      <button class="btn-grade grade-good" data-grade="2">
        <span class="grade-label">記得</span>
        <span class="grade-sub">幾天後</span>
      </button>
      <button class="btn-grade grade-easy" data-grade="3">
        <span class="grade-label">輕鬆</span>
        <span class="grade-sub">數週後</span>
      </button>
    </div>

    <div class="shortcut-hint">
      <kbd>空白</kbd> 翻牌 &nbsp;｜&nbsp;
      <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> 評分 &nbsp;｜&nbsp;
      <kbd>R</kbd> 重播
    </div>
  </section>

  <!-- ── 統計頁 ── -->
  <section id="screen-stats" class="hidden">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-learned">0</div>
        <div class="stat-label">已學習</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-due">0</div>
        <div class="stat-label">待複習</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">總卡片</div>
      </div>
    </div>

    <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">聲調顏色說明</h3>
    <div class="tone-legend">
      <div class="tone-item">
        <div class="tone-dot low"></div>
        <span>🔵 低音字（寒冷、沉向海底）</span>
      </div>
      <div class="tone-item">
        <div class="tone-dot mid"></div>
        <span>🟢 中音字（中性基準）</span>
      </div>
      <div class="tone-item">
        <div class="tone-dot high"></div>
        <span>🔴 高音字（炎熱、高漲）</span>
      </div>
    </div>

    <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">卡片類型說明</h3>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:4px">
        <strong>中 → 泰</strong>
        <span style="font-size:13px;color:var(--text-sub)">看中文，回想並說出泰文字</span>
      </div>
      <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:4px">
        <strong>泰 → 中</strong>
        <span style="font-size:13px;color:var(--text-sub)">看泰文字符，回想中文意思</span>
      </div>
      <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:4px">
        <strong>盲讀卡</strong>
        <span style="font-size:13px;color:var(--text-sub)">只看泰文，試著在心中默念發音，建立肌肉記憶</span>
      </div>
      <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:4px">
        <strong>盲聽卡</strong>
        <span style="font-size:13px;color:var(--text-sub)">只聽音頻，辨識是哪個泰文字，繞過母語干擾</span>
      </div>
    </div>
  </section>

  <!-- ── 設定頁 ── -->
  <section id="screen-settings" class="hidden">
    <div class="settings-section">
      <h3>每日學習量</h3>
      <div class="setting-row">
        <label>每日新卡數量</label>
        <input type="number" id="setting-daily-new" min="1" max="50" value="10">
      </div>
      <div class="setting-row">
        <label>顯示情境圖片</label>
        <input type="checkbox" id="setting-image" checked>
      </div>
    </div>

    <div class="settings-section">
      <h3>啟用卡片類型</h3>
      <div class="card-type-grid">
        <label class="card-type-option">
          <input type="checkbox" name="cardType" value="zh2th" checked> 中 → 泰
        </label>
        <label class="card-type-option">
          <input type="checkbox" name="cardType" value="th2zh" checked> 泰 → 中
        </label>
        <label class="card-type-option">
          <input type="checkbox" name="cardType" value="blind_read" checked> 盲讀卡
        </label>
        <label class="card-type-option">
          <input type="checkbox" name="cardType" value="blind_listen" checked> 盲聽卡
        </label>
      </div>
    </div>

    <button class="btn btn-save btn-full" id="btn-save-settings">儲存設定</button>
    <button class="btn btn-danger btn-full" id="btn-reset-all">清除所有學習記錄</button>
  </section>

</main>

<script src="js/vocabulary.js"></script>
<script src="js/srs.js"></script>
<script src="js/tts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
